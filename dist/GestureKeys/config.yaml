camera:
  index: 0

detection:
  smoothing_window: 1
  activation_delay: 0.05
  cooldown_duration: 0.5

gestures:
  open_palm: # open 5 fingers
    key: win+tab
    threshold: 0.7
  fist: # close 5 fingers
    key: esc
    threshold: 0.7
  thumbs_up: 
    key: enter
    threshold: 0.7
  peace: # index + middle
    key: win+ctrl+left
    threshold: 0.7
  pointing: # index
    key: alt+tab
    threshold: 0.7
  pinch: # index + thumb together
    key: win+down
    threshold: 0.05
  scout: # index + middle + ring
    key: win+ctrl+right
    threshold: 0.7
    
