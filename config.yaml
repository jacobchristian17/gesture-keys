preferred_hand: left  # Which hand to prefer when both are visible at startup ("left" or "right")

camera:
  index: 0

detection:
  smoothing_window: 2
  activation_delay: 0.2
  cooldown_duration: 0.1
  swipe_window: 0.5          # seconds to wait for static-to-swipe compound gesture

distance:
  enabled: true
  min_hand_size: 0.12
  max_hand_size: 0.4

gestures:
  open_palm: # open 5 fingers
    # key: space     
    key: win+tab
    threshold: 0.7
    swipe:
      swipe_left:
        key: "1"
      swipe_right:
        key: "2"
  fist: # close 5 fingers
    # key: space     
    key: space
    mode: hold
    threshold: 0.7

  thumbs_up: 
    # key: space     
    key: enter 
    threshold: 0.9
  pointing: # 1 finger up: index
    # key: space     
    key: alt+tab
    threshold: 0.7
  peace: # 2 fingers up: index + middle
    # key: space
    key: win+ctrl+left
    threshold: 0.7
    
  scout: # 3 fingers up:  index + middle + ring
    # key: space     
    key: win+ctrl+right
    threshold: 0.7
 
 
  pinch: # action: index + thumb together
    # key: space
    key: win+down
    threshold: 0.06
    # cooldown: 0.6  # optional: override global cooldown for this gesture

      
swipe:
  settling_frames: 2
  cooldown: 0.3
  min_velocity: 0.15
  min_displacement: 0.03
  axis_ratio: 1.5
  swipe_left:
    key: right
  swipe_right:
    key: left   
  swipe_up:
    key: up
  swipe_down:
    key: down