camera:
  index: 0

detection:
  smoothing_window: 1
  activation_delay: 0.2
  cooldown_duration: 0.5

gestures:
  open_palm:
    key: win+tab
    threshold: 0.7
  fist:
    key: esc
    threshold: 0.7
  thumbs_up:
    key: alt+tab
    threshold: 0.7
  peace:
    key: win+ctrl+left
    threshold: 0.7
  pointing:
    key: win+up
    threshold: 0.7
  pinch:
    key: win+down
    threshold: 0.05
    
